site_name: Git-versionhallinta
site_author: Markku Ruonavaara
copyright: Markku Ruonavaara 2024
nav:
  - johdanto.md
  - 'Paikallinen Git':
    - peruskaytto.md
    - haarat.md
  - 'Hajautettu Git':
    - etarepositoriot.md
    - hosting_palvelut.md
  - 'Git projektissa':
    - versionhallinta_projektissa.md
    - yhdistamispyynnot.md
  - muita_toimintoja.md
theme:
  name: material
  language: fi
  features:
    - content.code.copy
    - content.code.select
    - toc.integrate
    - navigation.footer
    - navigation.expand
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - toc:
      title: Sisällysluettelo
  - admonition
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

